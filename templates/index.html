
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="data:image/x-icon;base64,">
    <title>LinkedIn Profile Analyzer</title>
    <!-- Tailwind CDN for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <!-- Loader overlay (hidden by default) -->
    <div id="loader" class="loading-container" style="display:none;">
        <div class="loader-spinner" style="color:#0077b5;">
            <svg width="60" height="60" viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-dasharray="90,150" stroke-dashoffset="0">
                    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
                </circle>
            </svg>
            <div style="margin-top:16px; font-weight:600; font-size:1.1em;">Analyzing your profile...</div>
        </div>
    </div>
    <main id="main-content" class="w-full max-w-md mx-auto p-8 bg-white rounded-xl shadow-lg fade-in">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-700 mb-2">AI-Powered LinkedIn Profile Analyzer</h1>
            <p class="text-gray-600 text-base">Get instant, actionable feedback on your LinkedIn profile for your dream job.</p>
        </header>
        <form id="analyze-form" action="/suggestion" method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label for="profile_pdf" class="block font-medium text-gray-700 mb-1">Upload LinkedIn Profile (PDF) <span class="text-red-500">*</span></label>
                <input id="profile_pdf" type="file" name="profile_pdf" accept="application/pdf" required class="block w-full text-sm text-gray-700 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="job_desc" class="block font-medium text-gray-700 mb-1">Job Description</label>
                <textarea id="job_desc" name="job_desc" placeholder="Paste the job description here..." rows="5" class="block w-full text-sm text-gray-700 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-vertical"></textarea>
            </div>
            <div>
                <label for="job_role" class="block font-medium text-gray-700 mb-1">Or Target Job Role/Title</label>
                <input id="job_role" type="text" name="job_role" placeholder="e.g. Junior Data Analyst at TCS" class="block w-full text-sm text-gray-700 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="text-blue-700 text-sm mb-2">
                <p class="text-sm text-blue-300 mt-2">
  <strong>💡 Tip:</strong> Can’t copy the Job Description? <br>
  Use <strong>Google Lens</strong> or <strong>Circle to Search</strong> to extract text from the JD on LinkedIn and paste it here for better analysis.
                </p>
            </div>
            <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded transition-colors duration-150">Analyze</button>
        </form>
        <script>
        document.getElementById('analyze-form').addEventListener('submit', function(e) {
            var jd = this.job_desc.value.trim();
            var role = this.job_role.value.trim();
            if (!jd && !role) {
                // Use a more user-friendly alert
                if (window.confirm) {
                    window.alert('Please provide at least a job description or a target job role/title.');
                }
                e.preventDefault();
                // Optionally, focus the first empty field
                if (!jd) {
                    document.getElementById('job_desc').focus();
                } else {
                    document.getElementById('job_role').focus();
                }
            }
        });
        </script>
    </main>
    <script src="/static/main.js"></script>
</body>
</html>
