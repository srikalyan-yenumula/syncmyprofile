
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Suggestions</title>
     <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <main class="w-full max-w-lg mx-auto p-8 bg-white rounded-xl shadow-lg">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-blue-700 mb-2">Profile Suggestions</h1>
            <p class="text-gray-600 text-base">Here are your AI-powered suggestions to improve your LinkedIn profile.</p>
        </header>
        <section id="suggestion-section" class="mb-8">
            <div id="suggestion-result" class="result-container formatted-output prose max-w-none">{{ suggestion|safe }}</div>
        </section>
        <div class="text-center">
            <a href="/" class="inline-block text-blue-700 hover:text-blue-900 font-medium transition-colors duration-150">&larr; Back to Analyzer</a>
    </div>
    </main>
</body>
</html>
